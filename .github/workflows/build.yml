name: Build VoxelEngine

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3      # v4 → v6.0.3 (最新)
      
      - name: Set up JDK 17 for Gradle
        uses: actions/setup-java@v5         # v4 → v5 (最新)
        with:
          java-version: 17
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4   # v3 → v4 (最新)
        with:
          gradle-version: 9.5.1
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7    # v4 → v7 (最新)
        with:
          name: VoxelEngine
          path: build/libs/*.jar
          retention-days: 30
